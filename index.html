
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecometricus | Luxury Sustainability Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <script>
        // High-Priority HTML-Level Bypass for /MVP access
        if (typeof window !== 'undefined' && /mvp/i.test(window.location.pathname)) {
            sessionStorage.setItem('ecometricus_mvp_bypass', 'true');
        }

        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#152E2A',
                            gold: '#C8A413',
                            eco: '#77B139',
                            alert: '#FF3131',
                            energy: '#FF914D'
                        }
                    },
                    fontFamily: {
                        geometric: ['Montserrat', 'sans-serif'],
                        body: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #152E2A;
            color: white;
            font-family: 'Inter', sans-serif;
        }
        .hero-gradient {
            background: linear-gradient(to right, rgba(21, 46, 42, 1) 40%, rgba(21, 46, 42, 0.4) 100%);
        }
        .metric-card {
            border: 1px solid rgba(200, 164, 19, 0.3);
            transition: all 0.3s ease;
        }
        .metric-card:hover {
            border-color: #C8A413;
            box-shadow: 0 0 15px rgba(200, 164, 19, 0.2);
        }
    </style>
